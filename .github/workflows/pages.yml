name: Deploy Gallery to Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages and read render cache from GHCR
permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let a newer run cancel an in-flight one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Cache APT packages
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: openscad xvfb
        version: 1.0

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true

    - name: Sync Python dependencies
      run: uv sync

    # Renders to artifacts/stl + artifacts/preview. On a cache hit this just
    # pulls the prebuilt STL/PNG from GHCR instead of re-rendering.
    - name: Render models
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: uv run scad-tools render

    - name: Build gallery site
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: uv run scad-tools gallery

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
